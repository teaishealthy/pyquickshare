name: Run ruff

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libbluetooth-dev cmake pkgconf

      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
